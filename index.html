<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Student Registration Form</h1>

        <form id="myForm">

            <!-- Full Name -->
            <input type="text" id="name" placeholder="Enter Full Name">
            <p id="nameError"></p>

            <!-- Father Name -->
            <input type="text" id="fatherName" placeholder="Enter Father Name">
            <p id="fatherError"></p>

            <!-- Seat Number -->
            <input type="text" id="seatNo" placeholder="Enter Seat Number">
            <p id="seatError"></p>

            <!-- Roll Number -->
            <input type="text" id="rollNo" placeholder="Enter Roll Number">
            <p id="rollError"></p>

            <!-- Gender -->
            <label>Gender:</label>

            <div class="gender">

                <input type="radio" name="gender" value="Male"> Male

                <input type="radio" name="gender" value="Female"> Female

            </div>

            <p id="genderError"></p>

            <!-- Department -->
            <select id="department">

                <option value="">Select Department</option>

                <option>Computer Science</option>

                <option>Software Engineering</option>

                <option>Information Technology</option>

                <option>Artificial Intelligence</option>

            </select>

            <p id="departmentError"></p>

            <!-- Semester -->
            <select id="semester">

                <option value="">Select Semester</option>

                <option>1st Semester</option>

                <option>2nd Semester</option>

                <option>3rd Semester</option>

                <option>4th Semester</option>

                <option>5th Semester</option>

                <option>6th Semester</option>

                <option>7th Semester</option>

                <option>8th Semester</option>

            </select>

            <p id="semesterError"></p>

            <!-- Date of Birth -->
            <label>Date of Birth:</label>

            <input type="date" id="dob">

            <p id="dobError"></p>

            <!-- Contact Number -->
            <input type="tel" id="contact" placeholder="Enter Contact Number">

            <p id="contactError"></p>

            <!-- Email -->
            <input type="email" id="email" placeholder="Enter Email Address">

            <p id="emailError"></p>

            <!-- Address -->
            <textarea id="address" rows="4" placeholder="Enter Address"></textarea>

            <p id="addressError"></p>

            <!-- Password -->
            <input type="password" id="password" placeholder="Enter Password">

            <p id="passError"></p>

            <!-- Confirm Password -->
            <input type="password" id="confirmPassword" placeholder="Confirm Password">

            <p id="confirmError"></p>

            <!-- Submit Button -->
            <button type="submit">

                Register

            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
